<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>学園ブレード</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon-emblem.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="title-screen" class="title-screen">
      <img class="title-art" src="assets/title-art.png" alt="">
      <section class="title-panel" aria-labelledby="game-title">
        <p class="eyebrow">横スクロールシューティング</p>
        <h1 id="game-title">
          <img src="assets/title-logo-motion.svg" alt="学園ブレード">
        </h1>
        <p class="lead">御門院家が支配する学園で、黒羽 凛は立ちはだかる勢力に小刀を向ける。</p>
        <button id="start-button" type="button" class="start-button">ゲーム開始</button>
        <!-- DEV_DEBUG_ONLY_START -->
        <div id="debug-start-panel" class="debug-start-panel" hidden>
          <p class="debug-title">LOCAL DEBUG START</p>
          <label>
            Stage
            <select id="debug-stage-select">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </label>
          <label>
            Start
            <select id="debug-phase-select">
              <option value="wave1">Wave 1</option>
              <option value="midBossDialogue">Mid-boss dialogue</option>
              <option value="midBoss">Mid-boss</option>
              <option value="wave2">Wave 2</option>
              <option value="bossDialogue">Boss dialogue</option>
              <option value="boss">Boss</option>
              <option value="bossDefeatedDialogue">Post-boss dialogue</option>
            </select>
          </label>
          <button id="debug-start-button" type="button">Start</button>
        </div>
        <!-- DEV_DEBUG_ONLY_END -->
      </section>
    </main>
    <main id="game-screen" class="game-screen" hidden>
      <canvas id="game-canvas" width="960" height="540" aria-label="学園ブレード 1面"></canvas>
      <div class="orientation-notice" aria-live="polite">
        <p>端末を横向きにしてください</p>
      </div>
      <div id="mobile-controls" class="mobile-controls" aria-label="タッチ操作">
        <div id="move-pad" class="move-pad" aria-label="移動スティック">
          <div id="move-thumb" class="move-thumb"></div>
        </div>
        <button id="attack-button" type="button" class="attack-button" aria-label="攻撃。短押しで小刀、長押しして離すと突進">
          <span class="attack-label">攻撃</span>
          <span class="attack-hint">短押し: 小刀<br>長押し: 突進</span>
        </button>
      </div>
      <div id="dialogue-box" class="dialogue-box" hidden>
        <div class="portrait protagonist">
          <img src="assets/dialogue-rin.png" alt="黒羽 凛">
          <span>黒羽<br>凛</span>
        </div>
        <div class="dialogue-text">
          <p id="speaker-name" class="speaker-name"></p>
          <p id="dialogue-line" class="dialogue-line"></p>
          <button id="dialogue-next" type="button" class="dialogue-next">進む</button>
        </div>
        <div class="portrait rival">
          <img id="enemy-portrait" src="assets/dialogue-tsubame-midboss.png" alt="朝比奈 つばめ">
          <span>朝比奈<br>つばめ</span>
        </div>
      </div>
    </main>
    <script src="core/math.js"></script>
    <script src="core/assets.js"></script>
    <script src="core/audio.js"></script>
    <script src="game-config.js"></script>
    <script src="game.js"></script>
  </body>
</html>
