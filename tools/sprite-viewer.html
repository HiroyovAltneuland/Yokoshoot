<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sprite Motion Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #14161d;
      --panel: #20232c;
      --panel-2: #2a2e39;
      --line: #4a5060;
      --text: #f2f4f8;
      --muted: #aeb6c5;
      --accent: #7ee8ff;
      --danger: #ff5278;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      overflow: auto;
    }

    section {
      min-width: 0;
      padding: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 20px;
      letter-spacing: 0;
    }

    h2 {
      margin: 20px 0 10px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    label {
      display: grid;
      gap: 6px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 13px;
    }

    select,
    input,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      padding: 9px 10px;
    }

    input[type="range"] {
      padding: 0;
    }

    input[type="checkbox"] {
      width: auto;
    }

    button {
      cursor: pointer;
      background: #2f3948;
    }

    button:hover {
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .stage {
      display: grid;
      grid-template-rows: minmax(300px, 1fr) auto;
      gap: 14px;
      min-height: calc(100vh - 36px);
    }

    .viewer {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 340px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background-color: #ffffff;
      background-image:
        linear-gradient(45deg, #d8d8d8 25%, transparent 25%),
        linear-gradient(-45deg, #d8d8d8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d8d8d8 75%),
        linear-gradient(-45deg, transparent 75%, #d8d8d8 75%);
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      background-size: 20px 20px;
    }

    canvas {
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100%;
    }

    .hud {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: #f7fbff;
      font-size: 12px;
      text-shadow: 0 1px 2px #000;
      pointer-events: none;
    }

    .pill {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      padding: 4px 8px;
    }

    .filmstrip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
      gap: 10px;
      align-items: start;
    }

    .frame-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      padding: 8px;
      min-width: 0;
    }

    .frame-card canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid #3a3f4d;
      background: #fff;
    }

    .frame-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset;
    }

    .frame-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .error {
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
      min-height: 20px;
    }

    @media (max-width: 840px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <h1>Sprite Motion Viewer</h1>

      <label>
        Preset
        <select id="preset"></select>
      </label>

      <label>
        Image path
        <input id="path" type="text" spellcheck="false">
      </label>

      <div class="row">
        <label>
          Columns
          <input id="columns" type="number" min="1" max="24" step="1">
        </label>
        <label>
          Rows
          <input id="rows" type="number" min="1" max="24" step="1">
        </label>
      </div>

      <div class="row">
        <label>
          Row
          <input id="row" type="number" min="0" max="23" step="1">
        </label>
        <label>
          FPS
          <input id="fps" type="number" min="1" max="30" step="1">
        </label>
      </div>

      <div class="row">
        <label>
          Scale
          <input id="scale" type="number" min="1" max="8" step="0.25">
        </label>
        <label>
          Inset
          <input id="inset" type="number" min="0" max="32" step="1">
        </label>
      </div>

      <h2>Display</h2>
      <label class="check"><input id="playing" type="checkbox" checked> Play</label>
      <label class="check"><input id="flip" type="checkbox"> Flip X</label>
      <label class="check"><input id="grid" type="checkbox" checked> Show cell border</label>

      <label>
        Background
        <select id="background">
          <option value="checker">Checker</option>
          <option value="white">White</option>
          <option value="black">Black</option>
          <option value="stage">Stage dark</option>
        </select>
      </label>

      <button id="reload" type="button">Reload Image</button>
      <button id="prev" type="button">Prev Frame</button>
      <button id="next" type="button">Next Frame</button>

      <div id="error" class="error"></div>
    </aside>

    <section class="stage">
      <div id="viewer" class="viewer">
        <canvas id="main-canvas" width="512" height="384"></canvas>
        <div class="hud">
          <span id="size" class="pill"></span>
          <span id="cell" class="pill"></span>
          <span id="frame" class="pill"></span>
        </div>
      </div>
      <div id="filmstrip" class="filmstrip"></div>
    </section>
  </main>

  <script>
    "use strict";

    const presets = [
      { name: "Rin", path: "../assets/rin-sprite-sheet.png", columns: 3, rows: 7, row: 0, fps: 8, scale: 3, inset: 0 },
      { name: "Tsubame Boss", path: "../assets/tsubame-boss-sprite-sheet.png", columns: 3, rows: 2, row: 0, fps: 6, scale: 2.5, inset: 0 },
      { name: "Ritsuko Boss", path: "../assets/ritsuko-boss-sprite-sheet.png", columns: 3, rows: 2, row: 0, fps: 6, scale: 2.5, inset: 0 },
      { name: "Sayo Boss", path: "../assets/sayo-boss-sprite-sheet.png", columns: 3, rows: 2, row: 0, fps: 6, scale: 2.5, inset: 0 },
      { name: "Stage 1 Enemies", path: "../assets/stage1-enemy-sprite-sheet.png", columns: 3, rows: 5, row: 0, fps: 8, scale: 3, inset: 4 },
      { name: "Stage 2 Enemies", path: "../assets/stage2-enemy-sprite-sheet.png", columns: 3, rows: 3, row: 0, fps: 8, scale: 3, inset: 4 },
      { name: "Stage 2 Reinforcements", path: "../assets/stage2-reinforcement-sprite-sheet.png", columns: 4, rows: 2, row: 0, fps: 10, scale: 3, inset: 4 },
      { name: "Stage 2 Glasses Run 6 Test", path: "../assets/stage2-glasses-enforcer-run6-sprite-sheet.png", columns: 6, rows: 1, row: 0, fps: 12, scale: 3, inset: 4 },
    ];

    const controls = {
      preset: document.getElementById("preset"),
      path: document.getElementById("path"),
      columns: document.getElementById("columns"),
      rows: document.getElementById("rows"),
      row: document.getElementById("row"),
      fps: document.getElementById("fps"),
      scale: document.getElementById("scale"),
      inset: document.getElementById("inset"),
      playing: document.getElementById("playing"),
      flip: document.getElementById("flip"),
      grid: document.getElementById("grid"),
      background: document.getElementById("background"),
      reload: document.getElementById("reload"),
      prev: document.getElementById("prev"),
      next: document.getElementById("next"),
      error: document.getElementById("error"),
      viewer: document.getElementById("viewer"),
      mainCanvas: document.getElementById("main-canvas"),
      filmstrip: document.getElementById("filmstrip"),
      size: document.getElementById("size"),
      cell: document.getElementById("cell"),
      frame: document.getElementById("frame"),
    };

    const state = {
      image: new Image(),
      frame: 0,
      lastTick: 0,
      accumulator: 0,
    };

    for (const [index, preset] of presets.entries()) {
      const option = document.createElement("option");
      option.value = String(index);
      option.textContent = preset.name;
      controls.preset.append(option);
    }

    function numberValue(id, fallback) {
      const value = Number(controls[id].value);
      return Number.isFinite(value) ? value : fallback;
    }

    function settings() {
      const columns = Math.max(1, Math.round(numberValue("columns", 1)));
      const rows = Math.max(1, Math.round(numberValue("rows", 1)));
      const row = Math.min(rows - 1, Math.max(0, Math.round(numberValue("row", 0))));
      return {
        path: controls.path.value.trim(),
        columns,
        rows,
        row,
        fps: Math.max(1, numberValue("fps", 8)),
        scale: Math.max(1, numberValue("scale", 3)),
        inset: Math.max(0, Math.round(numberValue("inset", 0))),
        playing: controls.playing.checked,
        flip: controls.flip.checked,
        grid: controls.grid.checked,
      };
    }

    function applyPreset(preset) {
      controls.path.value = preset.path;
      controls.columns.value = preset.columns;
      controls.rows.value = preset.rows;
      controls.row.value = preset.row;
      controls.fps.value = preset.fps;
      controls.scale.value = preset.scale;
      controls.inset.value = preset.inset;
      state.frame = 0;
      loadImage();
    }

    function loadImage() {
      const src = controls.path.value.trim();
      controls.error.textContent = "";
      state.image = new Image();
      state.image.onload = () => {
        state.frame = 0;
        renderFilmstrip();
        draw();
      };
      state.image.onerror = () => {
        controls.error.textContent = `Could not load: ${src}`;
      };
      state.image.src = `${src}?t=${Date.now()}`;
    }

    function updateBackground() {
      controls.viewer.style.backgroundImage = "";
      if (controls.background.value === "checker") {
        controls.viewer.style.backgroundColor = "#ffffff";
        controls.viewer.style.backgroundImage = [
          "linear-gradient(45deg, #d8d8d8 25%, transparent 25%)",
          "linear-gradient(-45deg, #d8d8d8 25%, transparent 25%)",
          "linear-gradient(45deg, transparent 75%, #d8d8d8 75%)",
          "linear-gradient(-45deg, transparent 75%, #d8d8d8 75%)",
        ].join(",");
      } else if (controls.background.value === "white") {
        controls.viewer.style.backgroundColor = "#ffffff";
      } else if (controls.background.value === "black") {
        controls.viewer.style.backgroundColor = "#000000";
      } else {
        controls.viewer.style.backgroundColor = "#18202c";
      }
    }

    function cellRect() {
      const s = settings();
      const image = state.image;
      const cellW = image.naturalWidth / s.columns;
      const cellH = image.naturalHeight / s.rows;
      const inset = Math.min(s.inset, Math.floor(Math.min(cellW, cellH) / 3));
      return {
        sx: state.frame * cellW + inset,
        sy: s.row * cellH + inset,
        sw: cellW - inset * 2,
        sh: cellH - inset * 2,
        rawW: cellW,
        rawH: cellH,
        settings: s,
      };
    }

    function draw() {
      updateBackground();
      const canvas = controls.mainCanvas;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!state.image.complete || state.image.naturalWidth === 0) return;
      const rect = cellRect();
      const dw = Math.max(1, Math.round(rect.sw * rect.settings.scale));
      const dh = Math.max(1, Math.round(rect.sh * rect.settings.scale));
      canvas.width = Math.max(320, dw + 96);
      canvas.height = Math.max(260, dh + 96);
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const dx = Math.round((canvas.width - dw) / 2);
      const dy = Math.round((canvas.height - dh) / 2);
      ctx.save();
      if (rect.settings.flip) {
        ctx.translate(dx + dw, dy);
        ctx.scale(-1, 1);
        ctx.drawImage(state.image, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, dw, dh);
      } else {
        ctx.drawImage(state.image, rect.sx, rect.sy, rect.sw, rect.sh, dx, dy, dw, dh);
      }
      ctx.restore();

      if (rect.settings.grid) {
        ctx.strokeStyle = "rgba(126, 232, 255, 0.9)";
        ctx.lineWidth = 2;
        ctx.strokeRect(dx + 0.5, dy + 0.5, dw - 1, dh - 1);
      }

      controls.size.textContent = `${state.image.naturalWidth} x ${state.image.naturalHeight}`;
      controls.cell.textContent = `cell ${Math.round(rect.rawW)} x ${Math.round(rect.rawH)}`;
      controls.frame.textContent = `row ${rect.settings.row}, frame ${state.frame}`;
      markActiveFrame();
    }

    function renderFilmstrip() {
      controls.filmstrip.replaceChildren();
      if (!state.image.complete || state.image.naturalWidth === 0) return;
      const s = settings();
      for (let frame = 0; frame < s.columns; frame += 1) {
        const card = document.createElement("div");
        card.className = "frame-card";
        card.dataset.frame = String(frame);
        const canvas = document.createElement("canvas");
        const label = document.createElement("div");
        label.className = "frame-label";
        label.innerHTML = `<span>Frame ${frame}</span><span>Row ${s.row}</span>`;
        card.append(canvas, label);
        card.addEventListener("click", () => {
          state.frame = frame;
          controls.playing.checked = false;
          draw();
        });
        controls.filmstrip.append(card);
        drawFrameCanvas(canvas, frame);
      }
      markActiveFrame();
    }

    function drawFrameCanvas(canvas, frame) {
      const previousFrame = state.frame;
      state.frame = frame;
      const rect = cellRect();
      state.frame = previousFrame;
      canvas.width = Math.round(rect.sw);
      canvas.height = Math.round(rect.sh);
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(state.image, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, canvas.width, canvas.height);
    }

    function markActiveFrame() {
      for (const card of controls.filmstrip.children) {
        card.classList.toggle("active", Number(card.dataset.frame) === state.frame);
      }
    }

    function stepFrame(delta) {
      const s = settings();
      state.frame = (state.frame + delta + s.columns) % s.columns;
      draw();
    }

    function animate(time) {
      const s = settings();
      if (s.playing) {
        const dt = state.lastTick ? (time - state.lastTick) / 1000 : 0;
        state.accumulator += dt;
        const frameSeconds = 1 / s.fps;
        while (state.accumulator >= frameSeconds) {
          state.frame = (state.frame + 1) % s.columns;
          state.accumulator -= frameSeconds;
        }
        draw();
      }
      state.lastTick = time;
      requestAnimationFrame(animate);
    }

    controls.preset.addEventListener("change", () => applyPreset(presets[Number(controls.preset.value)]));
    controls.reload.addEventListener("click", loadImage);
    controls.prev.addEventListener("click", () => stepFrame(-1));
    controls.next.addEventListener("click", () => stepFrame(1));

    for (const id of ["columns", "rows", "row", "fps", "scale", "inset", "flip", "grid", "background"]) {
      controls[id].addEventListener("input", () => {
        state.frame = Math.min(state.frame, settings().columns - 1);
        renderFilmstrip();
        draw();
      });
    }

    controls.path.addEventListener("change", loadImage);
    controls.playing.addEventListener("input", () => {
      state.accumulator = 0;
      draw();
    });

    applyPreset(presets[0]);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
