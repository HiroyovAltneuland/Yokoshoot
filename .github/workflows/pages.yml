name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release files
        run: |
          mkdir .pages-dist
          rsync -a --exclude '.git' --exclude '.github' --exclude '.codex' --exclude '.pages-dist' --exclude 'tmp' --exclude 'local-debug-config.json' ./ .pages-dist/
          python3 - <<'PY'
          import re
          from pathlib import Path

          debug_block = re.compile(
              r"^[^\n]*DEV_DEBUG_ONLY_START[^\n]*\n.*?^[^\n]*DEV_DEBUG_ONLY_END[^\n]*\n?",
              re.MULTILINE | re.DOTALL,
          )
          for path in Path(".pages-dist").rglob("*"):
              if path.suffix not in {".html", ".css", ".js"}:
                  continue
              text = path.read_text(encoding="utf-8")
              path.write_text(debug_block.sub("", text), encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
